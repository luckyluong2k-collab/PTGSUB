<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#061f28">
  <title>Forum n&#7897;i b&#7897; | Sun Urban City</title>
  <link rel="icon" type="image/png" sizes="64x64" href="favicon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="sun-group-icon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    :root {
      --bg:#061f28;
      --bg-2:#0c3941;
      --panel:#f7fbf8;
      --line:#d7e5df;
      --ink:#102421;
      --muted:#667a74;
      --teal:#0f766e;
      --teal-2:#14b8a6;
      --gold:#d7b46a;
      --red:#b42318;
      --white:#fff;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      color:var(--ink);
      background:
        radial-gradient(circle at 8% 4%, rgba(20,184,166,.28), transparent 34%),
        radial-gradient(circle at 92% 0, rgba(215,180,106,.26), transparent 30%),
        linear-gradient(145deg, #04191f 0%, var(--bg) 42%, #092b31 100%);
      font:15px/1.5 "Be Vietnam Pro", Arial, Helvetica, sans-serif;
      min-height:100vh;
    }
    a { color:inherit; }
    button, textarea, input { font:inherit; }
    .forum-page {
      width:min(1080px, 100%);
      margin:0 auto;
      padding:24px 14px 42px;
    }
    .forum-brandbar {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom:14px;
      padding:12px 14px;
      border:1px solid rgba(215,180,106,.42);
      border-radius:8px;
      background:rgba(247,251,248,.94);
      box-shadow:0 14px 28px rgba(0,0,0,.22);
    }
    .forum-brand {
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }
    .forum-brand img {
      width:68px;
      height:48px;
      object-fit:contain;
      border-radius:8px;
      background:#fff;
      border:1px solid rgba(215,180,106,.5);
      padding:5px;
    }
    .forum-brand span {
      display:block;
      color:var(--teal);
      font-size:12px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .forum-brand strong {
      display:block;
      overflow:hidden;
      color:#073235;
      font-size:19px;
      font-weight:950;
      line-height:1.16;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .home-link {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:0 16px;
      border:1px solid rgba(215,180,106,.82);
      border-radius:8px;
      background:linear-gradient(180deg, #fff2bf 0%, #d7b46a 100%);
      color:#173d38;
      font-weight:950;
      text-decoration:none;
      box-shadow:0 6px 0 #8f732d, 0 13px 22px rgba(0,0,0,.16);
    }
    .home-link:active { transform:translateY(4px); box-shadow:0 2px 0 #8f732d, 0 8px 15px rgba(0,0,0,.12); }
    .brand-actions {
      display:flex;
      align-items:center;
      gap:10px;
    }
    .notification-toggle {
      position:relative;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:46px;
      min-height:42px;
      border:1px solid rgba(15,118,110,.32);
      border-radius:8px;
      background:#fff;
      color:#0a5550;
      font-size:21px;
      cursor:pointer;
      box-shadow:0 5px 0 #b9d3cc, 0 11px 18px rgba(15,118,110,.14);
    }
    .notification-count {
      position:absolute;
      top:-7px;
      right:-7px;
      display:grid;
      place-items:center;
      min-width:22px;
      height:22px;
      padding:0 6px;
      border:2px solid #fff;
      border-radius:999px;
      background:#d92d20;
      color:#fff;
      font-size:11px;
      font-weight:950;
    }
    .notification-count[hidden] { display:none; }
    .notification-panel {
      position:fixed;
      top:18px;
      right:18px;
      z-index:30;
      width:min(430px, calc(100% - 24px));
      max-height:calc(100vh - 36px);
      overflow:hidden;
      border:1px solid rgba(215,180,106,.65);
      border-radius:12px;
      background:#f8fcfa;
      box-shadow:0 28px 70px rgba(0,0,0,.38);
    }
    .notification-panel[hidden] { display:none; }
    .notification-head {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(135deg,#07363b,#0f766e);
      color:#fff;
    }
    .notification-head h2 { margin:0; font-size:18px; }
    .notification-head-actions { display:flex; align-items:center; gap:7px; }
    .notification-head button {
      min-height:34px;
      border:1px solid rgba(255,255,255,.4);
      border-radius:7px;
      background:rgba(255,255,255,.12);
      color:#fff;
      font-size:12px;
      font-weight:900;
      cursor:pointer;
    }
    .notification-close { width:34px; font-size:18px !important; }
    .notification-list {
      display:grid;
      gap:8px;
      max-height:calc(100vh - 104px);
      overflow:auto;
      padding:10px;
    }
    .notification-item {
      width:100%;
      padding:11px 12px;
      border:1px solid var(--line);
      border-radius:9px;
      background:#fff;
      color:var(--ink);
      text-align:left;
      cursor:pointer;
    }
    .notification-item.unread {
      border-color:rgba(15,118,110,.45);
      background:#eafbf5;
      box-shadow:inset 4px 0 0 var(--teal);
    }
    .notification-item strong,
    .notification-item span { display:block; }
    .notification-item span { margin-top:3px; color:var(--muted); font-size:12px; }
    .hero {
      margin-bottom:14px;
      padding:22px;
      border:1px solid rgba(215,180,106,.32);
      border-radius:8px;
      background:linear-gradient(135deg, rgba(4,25,31,.96), rgba(10,64,70,.94));
      color:#fff;
      box-shadow:0 18px 36px rgba(0,0,0,.22);
    }
    .eyebrow {
      margin:0 0 6px;
      color:var(--gold);
      font-size:12px;
      font-weight:900;
      letter-spacing:.09em;
      text-transform:uppercase;
    }
    h1 {
      margin:0;
      font-size:clamp(26px, 4vw, 40px);
      line-height:1.12;
    }
    .hero p {
      max-width:760px;
      margin:9px 0 0;
      color:#d7eee9;
    }
    .forum-layout {
      display:grid;
      grid-template-columns:minmax(280px, .78fr) minmax(0, 1.42fr);
      gap:14px;
      align-items:start;
    }
    .panel {
      border:1px solid var(--line);
      border-radius:8px;
      background:var(--panel);
      box-shadow:0 14px 28px rgba(0,0,0,.16);
      overflow:hidden;
    }
    .panel-head {
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, #fff, #eff7f4);
    }
    .panel-head h2 {
      margin:0;
      color:#0a3b3c;
      font-size:18px;
    }
    .panel-body { padding:14px 16px 16px; }
    .member-card {
      display:grid;
      gap:8px;
      color:var(--muted);
    }
    .member-card strong {
      color:var(--ink);
      font-size:16px;
    }
    .status {
      margin:0 0 12px;
      padding:10px 12px;
      border:1px solid rgba(15,118,110,.22);
      border-radius:8px;
      background:#ecfdf7;
      color:#0c554f;
      font-weight:800;
    }
    .status.error {
      border-color:rgba(180,35,24,.24);
      background:#fff1ef;
      color:var(--red);
    }
    .post-form {
      display:grid;
      gap:10px;
    }
    textarea {
      width:100%;
      min-height:132px;
      resize:vertical;
      border:1px solid #bfd2cb;
      border-radius:8px;
      padding:12px;
      color:var(--ink);
      background:#fff;
      outline:none;
    }
    textarea:focus {
      border-color:var(--teal);
      box-shadow:0 0 0 3px rgba(20,184,166,.16);
    }
    .form-row {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      color:var(--muted);
      font-size:13px;
    }
    .primary-btn,
    .danger-btn {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      border-radius:8px;
      font-weight:950;
      cursor:pointer;
    }
    .primary-btn {
      min-width:120px;
      border:1px solid #085e57;
      background:linear-gradient(180deg, var(--teal-2), var(--teal));
      color:#fff;
      box-shadow:0 5px 0 #064c48, 0 11px 18px rgba(15,118,110,.24);
    }
    .primary-btn:disabled {
      cursor:not-allowed;
      filter:grayscale(.4);
      opacity:.66;
      box-shadow:none;
    }
    .danger-btn {
      min-width:68px;
      border:1px solid rgba(180,35,24,.28);
      background:#fff4f2;
      color:var(--red);
    }
    .post-list {
      display:grid;
      gap:10px;
    }
    .empty {
      margin:0;
      padding:18px;
      border:1px dashed #aac7be;
      border-radius:8px;
      color:var(--muted);
      background:#fff;
      text-align:center;
    }
    .post-card {
      display:grid;
      gap:10px;
      padding:14px;
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
    }
    .post-card.is-featured {
      border-color:rgba(215,180,106,.9);
      background:linear-gradient(145deg,#fffdf5,#fff);
      box-shadow:inset 4px 0 0 var(--gold);
    }
    .featured-badge {
      display:inline-flex;
      width:max-content;
      align-items:center;
      gap:5px;
      padding:4px 8px;
      border:1px solid rgba(215,180,106,.72);
      border-radius:999px;
      background:#fff4c7;
      color:#725716;
      font-size:11px;
      font-weight:950;
      text-transform:uppercase;
    }
    .post-head {
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
    }
    .post-author {
      display:grid;
      gap:2px;
      min-width:0;
    }
    .post-author strong {
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .post-author span,
    .post-time {
      color:var(--muted);
      font-size:12px;
    }
    .post-body {
      margin:0;
      color:#1c2d29;
      white-space:pre-wrap;
      word-break:break-word;
    }
    .post-actions {
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      padding-top:4px;
      border-top:1px solid #edf3f0;
    }
    .action-btn {
      min-height:36px;
      padding:0 11px;
      border:1px solid #c9dad4;
      border-radius:8px;
      background:#f7fbf9;
      color:#365a53;
      font-size:13px;
      font-weight:900;
      cursor:pointer;
    }
    .action-btn.is-active { border-color:#0f766e; background:#dff8ef; color:#075c56; }
    .action-btn.featured { border-color:#d7b46a; background:#fff7d7; color:#725716; }
    .comments {
      display:grid;
      gap:9px;
      padding:10px;
      border:1px solid #dfeae6;
      border-radius:9px;
      background:#f5faf8;
    }
    .comment-list { display:grid; gap:8px; }
    .comment {
      padding:9px 10px;
      border:1px solid #dce8e3;
      border-radius:8px;
      background:#fff;
    }
    .comment-head {
      display:flex;
      justify-content:space-between;
      gap:8px;
      color:var(--muted);
      font-size:11px;
    }
    .comment-head strong { color:#173b36; font-size:12px; }
    .comment p { margin:5px 0 7px; white-space:pre-wrap; word-break:break-word; }
    .comment-actions { display:flex; gap:7px; }
    .comment-form {
      display:flex;
      gap:8px;
    }
    .comment-form input {
      min-width:0;
      flex:1;
      border:1px solid #bfd2cb;
      border-radius:8px;
      padding:9px 10px;
      outline:none;
    }
    .comment-form input:focus { border-color:var(--teal); box-shadow:0 0 0 3px rgba(20,184,166,.14); }
    .comment-form button { min-width:70px; min-height:38px; }
    .auth-check {
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      padding:20px;
      background:rgba(4,25,31,.9);
      color:#fff;
      text-align:center;
      z-index:20;
    }
    .auth-check-card {
      width:min(420px, 100%);
      border:1px solid rgba(215,180,106,.5);
      border-radius:8px;
      background:#0b3339;
      padding:22px;
      box-shadow:0 20px 48px rgba(0,0,0,.32);
    }
    .auth-check-card strong {
      display:block;
      margin-bottom:6px;
      color:var(--gold);
      font-size:18px;
    }
    .auth-check-card p { margin:0; color:#d7eee9; }
    body.forum-ready .auth-check { display:none; }
    @media (max-width:760px) {
      .forum-page { padding:14px 10px 30px; }
      .forum-brandbar { align-items:stretch; flex-direction:column; }
      .brand-actions { width:100%; }
      .home-link { flex:1; }
      .home-link { width:100%; }
      .hero { padding:18px 16px; }
      .forum-layout { grid-template-columns:1fr; }
      .post-head { flex-direction:column; }
      .danger-btn { width:100%; }
      .notification-panel { top:8px; right:8px; width:calc(100% - 16px); max-height:calc(100vh - 16px); }
      .comment-form { align-items:stretch; flex-direction:column; }
    }
  </style>
</head>
<body>
  <div class="auth-check" id="forumAuthGuard">
    <div class="auth-check-card">
      <strong>&#272;ang ki&#7875;m tra quy&#7873;n truy c&#7853;p</strong>
      <p>Vui l&#242;ng ch&#7901; trong gi&#226;y l&#225;t.</p>
    </div>
  </div>

  <main class="forum-page" id="forumApp" hidden>
    <header class="forum-brandbar">
      <div class="forum-brand">
        <img src="sun-group-logo.png" alt="Sun Group">
        <div>
          <span>Sun Urban City</span>
          <strong>Forum n&#7897;i b&#7897; PTGSUB</strong>
        </div>
      </div>
      <div class="brand-actions">
        <button class="notification-toggle" id="notificationToggle" type="button" aria-controls="notificationPanel" aria-expanded="false" aria-label="Mở thông báo">
          <span aria-hidden="true">&#128276;</span>
          <span class="notification-count" id="notificationCount" hidden>0</span>
        </button>
        <a class="home-link" href="index.html">V&#7873; b&#7843;ng t&#237;nh gi&#225;</a>
      </div>
    </header>

    <section class="hero">
      <p class="eyebrow">Trao &#273;&#7893;i n&#7897;i b&#7897;</p>
      <h1>Forum th&#224;nh vi&#234;n</h1>
      <p>N&#417;i ghi nhanh th&#244;ng b&#225;o, kinh nghi&#7879;m t&#432; v&#7845;n v&#224; c&#225;c l&#432;u &#253; khi tra c&#259;n.</p>
    </section>

    <section class="forum-layout" aria-label="Forum th&#224;nh vi&#234;n">
      <aside class="panel">
        <header class="panel-head">
          <h2>T&#224;i kho&#7843;n</h2>
        </header>
        <div class="panel-body">
          <div class="member-card">
            <strong id="memberName">&#272;ang t&#7843;i...</strong>
            <span id="memberEmail"></span>
            <span id="memberRole"></span>
          </div>
        </div>
      </aside>

      <section class="panel">
        <header class="panel-head">
          <h2>B&#7843;ng tin</h2>
        </header>
        <div class="panel-body">
          <p class="status" id="forumStatus" role="status">&#272;ang t&#7843;i forum...</p>
          <form class="post-form" id="forumForm">
            <textarea id="forumBody" maxlength="1500" placeholder="Nh&#7853;p n&#7897;i dung c&#7847;n chia s&#7867;..." required></textarea>
            <div class="form-row">
              <span id="charCount">0/1500</span>
              <button class="primary-btn" id="forumSubmit" type="submit">G&#7917;i b&#224;i</button>
            </div>
          </form>
          <div class="post-list" id="postList" aria-live="polite"></div>
        </div>
      </section>
    </section>
  </main>

  <aside class="notification-panel" id="notificationPanel" aria-labelledby="notificationTitle" hidden>
    <header class="notification-head">
      <h2 id="notificationTitle">Thông báo</h2>
      <div class="notification-head-actions">
        <button id="markAllRead" type="button">Đánh dấu đã đọc</button>
        <button class="notification-close" id="notificationClose" type="button" aria-label="Đóng thông báo">&times;</button>
      </div>
    </header>
    <div class="notification-list" id="notificationList"></div>
  </aside>

  <script type="module" src="forum.js?v=2"></script>
</body>
</html>
