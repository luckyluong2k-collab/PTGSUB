name: Export full website source

on:
  push:
    paths:
      - ".github/workflows/export-full-source.yml"

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build ZIP package
        run: |
          rm -f PTGSUB-full-source.zip
          zip -r PTGSUB-full-source.zip . \
            -x ".git/*" \
            -x ".github/workflows/export-full-source.yml" \
            -x "PTGSUB-full-source.zip"

      - name: Commit ZIP package
        run: |
          git config user.name "PTGSUB Export Bot"
          git config user.email "actions@users.noreply.github.com"
          git add PTGSUB-full-source.zip
          git commit -m "Export full PTGSUB website source" || exit 0
          git push
