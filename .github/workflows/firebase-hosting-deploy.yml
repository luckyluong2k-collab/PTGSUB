name: Deploy PTGSUB to Firebase Hosting

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app.js"
      - "ui-unit-lookup.js"
      - "service-worker.js"
      - "styles.css"
      - "feng-shui.css"
      - "feng-shui.js"
      - "firebase-index.html"
      - "firebase-auth.js"
      - "unit-data.js"
      - "lowrise-map-sharp.jpg"
      - ".github/workflows/firebase-hosting-deploy.yml"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Firebase version of index
        run: |
          cp firebase-index.html index.html

      - name: Deploy live hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_PTG_SUB }}"
          channelId: live
          projectId: ptg-sub
