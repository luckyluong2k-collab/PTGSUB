name: Apply low-rise automatic map patch

on:
  push:
    paths:
      - ".github/scripts/apply_lowrise_auto_map.py"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply low-rise map patch
        run: python .github/scripts/apply_lowrise_auto_map.py

      - name: Validate JavaScript
        run: |
          node --check app.js
          node --check service-worker.js

      - name: Commit generated changes
        run: |
          if git diff --quiet; then
            echo "No changes required"
            exit 0
          fi
          git config user.name "PTGSUB automation"
          git config user.email "actions@users.noreply.github.com"
          git add app.js index.html service-worker.js
          git commit -m "Enable automatic low-rise unit coordinates"
          git push
